<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - السكرتيرة الذكية</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .msg { margin-top: 15px; color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>تسجيل الدخول</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
    <input type="password" id="password" placeholder="كلمة المرور" required>
    <button onclick="saveData()">دخول</button>
    <div id="message" class="msg"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBwNGviMj8Y9RtarKo-INQ9UdofvIyW4XQ",
    authDomain: "smart-secretary-system-13f33.firebaseapp.com",
    databaseURL: "https://smart-secretary-system-13f33-default-rtdb.firebaseio.com",
    projectId: "smart-secretary-system-13f33",
    storageBucket: "smart-secretary-system-13f33.firebasestorage.app",
    messagingSenderId: "749053278104",
    appId: "1:749053278104:web:61c3e4e2fd2b220e409ded"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.saveData = function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');

    if(email && password) {
      push(ref(db, 'users'), {
        email: email,
        password: password,
        date: new Date().toISOString()
      }).then(() => {
        messageDiv.innerText = "تم تسجيل البيانات بنجاح في القاعدة!";
        document.getElementById('email').value = "";
        document.getElementById('password').value = "";
      }).catch((error) => {
        messageDiv.style.color = "red";
        messageDiv.innerText = "خطأ: " + error.message;
      });
    } else {
      alert("يرجى ملء البيانات");
    }
  }
</script>

</body>
</html>
