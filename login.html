<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - السكرتيرة الذكية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #5a67d8; }
        .link-btn { display: block; margin-top: 15px; color: #667eea; text-decoration: none; font-size: 14px; }
        .msg { margin-top: 15px; color: #2d3748; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>مرحباً بكِ</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
    <input type="password" id="password" placeholder="كلمة المرور" required>
    <button onclick="saveData()">تسجيل الدخول</button>
    <a href="register.html" class="link-btn">ليس لدي حساب؟ سجل هنا</a>
    <div id="message" class="msg"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBwNGviMj8Y9RtarKo-INQ9UdofvIyW4XQ",
    authDomain: "smart-secretary-system-13f33.firebaseapp.com",
    databaseURL: "https://smart-secretary-system-13f33-default-rtdb.firebaseio.com",
    projectId: "smart-secretary-system-13f33",
    storageBucket: "smart-secretary-system-13f33.firebasestorage.app",
    messagingSenderId: "749053278104",
    appId: "1:749053278104:web:61c3e4e2fd2b220e409ded"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.saveData = function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');

    if(email && password) {
      messageDiv.style.color = "blue";
      messageDiv.innerText = "جاري التحقق...";

      push(ref(db, 'users'), {
        email: email,
        password: password,
        timestamp: new Date().toLocaleString()
      }).then(() => {
        messageDiv.style.color = "green";
        messageDiv.innerText = "تم التسجيل! جاري فتح صفحة المواعيد...";
        
        // الترتيب: هينقلك لصفحة index.html (اللي هي صفحة المواعيد عندك)
        setTimeout(() => {
            window.location.href = "index.html"; 
        }, 1500);

      }).catch((error) => {
        messageDiv.style.color = "red";
        messageDiv.innerText = "حدث خطأ: " + error.message;
      });
    } else {
      alert("من فضلك ادخلي البيانات كاملة");
    }
  }
</script>

</body>
</html>
